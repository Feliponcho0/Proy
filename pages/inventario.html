<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE</title>

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!--Google Fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

    <!--estilos CSS-->
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>
    <div id="menu"></div> 
    
    <!--Contenido-->
    <div id="contenido-principal" class="titulo-principal p-4">
        <div class="d-flex justify-content-between">
            <h1 class="tipoLetra fw-bold pb-2">Inventario</h1>
            <!--Boton agregar-->
            <form class="" action="" method="">
                <button class="boton-azul-hover btn bg-primary me-2 text-white border border-black">Agregar Producto</button>
            </form>
        </div>

        <div class="d-flex">
            <form class="w-50" role="search">
                <div class="input-group border border-primary rounded">
                    <span class="input-group-text">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-search"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" /><path d="M21 21l-6 -6" /></svg>
                    </span>
                    <input id="search_inventario" class="form-control border-1" type="search" placeholder="Buscar producto...">
                </div>
            </form>
            <form action="#" method="">
                <div class="d-flex dropdown px-3">
                    <button class="btn btn-light border border-primary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Todas las categorías
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Alimentos</a></li>
                        <li><a class="dropdown-item" href="#">Bebidas</a></li>
                    </ul>
                </div>
            </form>
            <form action="#" method="">
                <div class="d-flex dropdown px-0">
                    <button class="btn btn-light border border-primary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Todos
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Todos</a></li>
                        <li><a class="dropdown-item" href="#">Activos</a></li>
                        <li><a class="dropdown-item" href="#">Inactivos</a></li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="row mt-3">
            <div class="col-sm-12">
                <div class="card shadow ">
                    <div class="card-body"> 
                        <!--Tabla de inventario-->
                        <div class="px-3">
                            <table id = "tabla_punto_venta" class = "table table-striped table-hover mt-3">
                                <tr class="align-middle">
                                    <th>Codigo</th>
                                    <th>Producto</th>
                                    <th>categoría</th>
                                    <th>Stock</th>
                                    <th>Precio</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                                <tr class="align-middle">
                                    <td>001</td>
                                    <td>Sabritas</td>
                                    <td>Alimentos</td>
                                    <td>30</td>
                                    <td>$25.00</td>
                                    <td>Activo</td>
                                    <td>
                                        <form action="" method="">
                                            <button class="boton-azul-hover btn bg-primary btn-sm me-2 text-white">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-edit"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M7 7h-1a2 2 0 0 0 -2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2 -2v-1" /><path d="M20.385 6.585a2.1 2.1 0 0 0 -2.97 -2.97l-8.415 8.385v3h3l8.385 -8.415" /><path d="M16 5l3 3" /></svg>
                                            </button>
                                            <button class="boton-rojo-hover btn bg-danger btn-sm me-2 text-white">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-pencil-cancel"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4" /><path d="M13.5 6.5l4 4" /><path d="M16 19a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" /><path d="M17 21l4 -4" /></svg>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>


</body>
<script src="../js/cargar_menu.js"></script>

</html>
