<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE</title>

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!--Google Fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    <!--estilos CSS-->
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>
    <div id="menu"></div> 
    <div id="contenido-principal" class="p-4">
        <h1 class="tipoLetra h4 fw-bold pb-2">Punto de venta</h1>

        <div class="row">
            <div class="col-sm-8 ">
                <div class="card shadow">
                    <div class="card-body">
                        <nav class="navbar">
                            <div class="container-fluid">
                                <form class="w-100" role="search">
                                    <div class="input-group border border-primary rounded">
                                        <span class="input-group-text">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-search"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" /><path d="M21 21l-6 -6" /></svg>
                                        </span>
                                        <input class="form-control border-1" type="search" placeholder="Buscar por nombre, código de barras">
                                    </div>
                                </form>
                            </div>
                        </nav>
                        <!--Tabla del punto de venta-->
                        <div class="px-3">
                            <table class = "table table-striped table-hover mt-3">
                                <tr>
                                    <th>Codigo</th>
                                    <th>Producto</th>
                                    <th>Cantidad</th>
                                    <th>Precio unitario</th>
                                    <th>Descuento</th>
                                    <th>Total</th>
                                </tr>
                                <tr>
                                    <td>001</td>
                                    <td>001</td>
                                    <td>3</td>
                                    <td>$25.00</td>
                                    <td> </td>
                                    <td>$75.00</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-sm-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="h6 fw-bold pb-2">Resumen de venta</h2>
                    </div>
                </div>
            </div>

        </div>

    </div>
</body>

<script src="../js/cargar_menu.js"></script>

</html>
